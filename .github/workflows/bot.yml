name: Legacy Manual Bot - DisplayForce Report Download

on:
  workflow_dispatch:

concurrency:
  group: bot-displayforce
  cancel-in-progress: false

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium (Playwright)
        run: |
          sudo apt-get install -y libasound2t64
          playwright install chromium
          playwright install-deps chromium || echo "Aviso: libasound2 nao encontrado (libasound2t64 ja instalado)"

      - name: Rodar o bot
        env:
          DISPLAYFORCE_EMAIL: ${{ secrets.DISPLAYFORCE_EMAIL }}
          DISPLAYFORCE_PASS: ${{ secrets.DISPLAYFORCE_PASS }}
          RELATORIO_EMAIL: ${{ secrets.RELATORIO_EMAIL }}
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HEADLESS: "true"
          TIMEOUT_EMAIL_SEG: "300"
        run: python bot_displayforce.py --once

      - name: Salvar logs em caso de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-bot
          path: |
            bot_displayforce.log
            downloads_displayforce/
