name: Bot DisplayForce — Atualização Diária

on:
  # Roda todo dia às 10:00 horário de Brasília (13:00 UTC)
  schedule:
    - cron: '0 10 * * *'

  # Permite rodar manualmente pelo botão no GitHub quando precisar
  workflow_dispatch:

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium (Playwright)
        run: |
          # Ubuntu 24.04: libasound2 foi renomeado para libasound2t64
          sudo apt-get install -y libasound2t64
          # Instalar Chromium
          playwright install chromium
          # Instalar demais dependências (ignorar erro do libasound2 renomeado)
          playwright install-deps chromium || echo "Aviso: libasound2 não encontrado (libasound2t64 já instalado)"

      - name: Rodar o bot
        env:
          DISPLAYFORCE_EMAIL: ${{ secrets.DISPLAYFORCE_EMAIL }}
          DISPLAYFORCE_PASS: ${{ secrets.DISPLAYFORCE_PASS }}
          RELATORIO_EMAIL: ${{ secrets.RELATORIO_EMAIL }}
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HEADLESS: "true"
          HORARIO_EXECUCAO: "10:00"
        run: python bot_displayforce.py --once

      - name: Salvar logs em caso de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-bot
          path: |
            bot_displayforce.log
            downloads_displayforce/
